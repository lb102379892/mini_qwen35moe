<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM-Phantom</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1b26; --surface: #24283b; --border: #3b4261;
    --text: #c0caf5; --text-dim: #565f89; --accent: #7aa2f7;
    --user-bg: #283457; --assistant-bg: #1e2030; --think-bg: #1a1e2e;
    --radius: 12px; --max-w: 820px;
  }
  html, body, #root { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  #root { display: flex; flex-direction: column; }
  header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 600; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--accent); color: var(--bg); font-weight: 600; }
  .status { margin-left: auto; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-on { background: #9ece6a; }
  .dot-off { background: #f7768e; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: var(--max-w); width: 100%; margin: 0 auto; }
  .msg-user .bubble { background: var(--user-bg); border-radius: var(--radius) var(--radius) 4px var(--radius); padding: 12px 16px; margin-left: 48px; }
  .msg-assistant .bubble { background: var(--assistant-bg); border-radius: var(--radius) var(--radius) var(--radius) 4px; padding: 12px 16px; border: 1px solid var(--border); margin-right: 48px; }
  .role { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.5px; }
  .content { white-space: pre-wrap; line-height: 1.65; font-size: 14px; word-break: break-word; }
  .content strong { color: #bb9af7; }
  .think-block { color: var(--text-dim); font-size: 13px; background: var(--think-bg); padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid var(--border); }
  .think-toggle { cursor: pointer; font-size: 12px; color: var(--text-dim); user-select: none; }
  .think-toggle:hover { color: var(--accent); }
  .input-area { flex-shrink: 0; border-top: 1px solid var(--border); padding: 16px 24px; }
  .input-form { max-width: var(--max-w); margin: 0 auto; display: flex; gap: 12px; }
  .input-form textarea { flex: 1; resize: none; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); padding: 12px 16px; font-family: inherit; font-size: 14px; line-height: 1.5; outline: none; min-height: 48px; max-height: 150px; }
  .input-form textarea:focus { border-color: var(--accent); }
  .input-form textarea::placeholder { color: var(--text-dim); }
  .input-form button { padding: 0 20px; border: none; border-radius: var(--radius); background: var(--accent); color: var(--bg); font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .input-form button:hover { opacity: 0.9; }
  .input-form button:disabled { opacity: 0.4; cursor: not-allowed; }
  .typing span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: blink 1.4s infinite; margin-right: 4px; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .empty { text-align: center; margin: auto; color: var(--text-dim); }
  .empty h2 { font-size: 24px; margin-bottom: 8px; color: var(--text); }
  .empty p { font-size: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react"
  }
}
</script>
<script type="module">
import React, { useState, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { QueryClient, QueryClientProvider, useMutation, useQuery } from 'https://esm.sh/@tanstack/react-query@5?external=react,react-dom';
import htm from 'https://esm.sh/htm@3.1.1';

const h = htm.bind(React.createElement);
const qc = new QueryClient({ defaultOptions: { queries: { retry: false } } });

function formatContent(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br/>');
}

function ThinkBlock({ content }) {
  const [open, setOpen] = useState(false);
  const lines = content.trim().split('\n').length;
  if (!content.trim()) return null;
  return h`<div class="think-block">
    <div class="think-toggle" onClick=${() => setOpen(v => !v)}>
      ${open ? '\u25BC' : '\u25B6'} Thinking${open ? '' : ` (${lines} lines)`}
    </div>
    ${open && h`<div class="content" style=${{ marginTop: '6px' }}
      dangerouslySetInnerHTML=${{ __html: formatContent(content) }} />`}
  </div>`;
}

function Message({ role, content, loading }) {
  if (loading) return h`<div class="msg msg-assistant"><div class="role">assistant</div>
    <div class="bubble"><div class="typing"><span/><span/><span/></div></div></div>`;

  const parts = [];
  let rest = content || '';
  while (rest.length > 0) {
    const s = rest.indexOf('<think>');
    if (s === -1) { parts.push({ t: 'text', c: rest }); break; }
    if (s > 0) parts.push({ t: 'text', c: rest.slice(0, s) });
    const e = rest.indexOf('</think>', s);
    if (e === -1) { parts.push({ t: 'think', c: rest.slice(s + 7) }); break; }
    parts.push({ t: 'think', c: rest.slice(s + 7, e) });
    rest = rest.slice(e + 8);
  }

  return h`<div class="msg msg-${role}"><div class="role">${role}</div><div class="bubble">
    ${parts.map((p, i) => p.t === 'think'
      ? h`<${ThinkBlock} key=${i} content=${p.c} />`
      : h`<div key=${i} class="content" dangerouslySetInnerHTML=${{ __html: formatContent(p.c) }} />`
    )}
  </div></div>`;
}

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const chatRef = useRef(null);
  const taRef = useRef(null);

  const health = useQuery({
    queryKey: ['health'],
    queryFn: () => fetch('/health').then(r => r.ok ? r.json() : Promise.reject()),
    refetchInterval: 10000,
  }, qc);

  const chat = useMutation({
    mutationFn: async ({ history, text }) => {
      const apiMsgs = [...history, { role: 'user', content: text }]
        .map(m => ({ role: m.role, content: m.content }));
      const resp = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'qwen3.5-397b-a17b', messages: apiMsgs, max_tokens: 100, temperature: 0.7, stream: false }),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      return data.choices?.[0]?.message?.content || '';
    },
    onSuccess: (content) => {
      setMessages(prev => {
        const next = [...prev];
        next[next.length - 1] = { role: 'assistant', content };
        return next;
      });
    },
    onError: (err) => {
      setMessages(prev => {
        const next = [...prev];
        next[next.length - 1] = { role: 'assistant', content: 'Error: ' + err.message };
        return next;
      });
    },
  }, qc);

  const send = useCallback(() => {
    const text = input.trim();
    if (!text || chat.isPending) return;
    const history = messages.filter(m => !m.loading);
    setMessages(prev => [...prev, { role: 'user', content: text }, { role: 'assistant', content: '', loading: true }]);
    setInput('');
    if (taRef.current) taRef.current.style.height = 'auto';
    chat.mutate({ history, text });
    requestAnimationFrame(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; });
  }, [input, messages, chat]);

  const onKey = useCallback((e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }, [send]);

  const onInput = useCallback((e) => {
    setInput(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px';
  }, []);

  const isOnline = health.data?.status === 'ok';

  return h`
    <header>
      <h1>LLM-Phantom</h1>
      <span class="badge">Qwen3.5-397B</span>
      <div class="status">
        <span class="dot ${isOnline ? 'dot-on' : 'dot-off'}" />
        ${isOnline ? 'Online' : 'Offline'}
      </div>
    </header>
    <div class="chat-area" ref=${chatRef}>
      ${messages.length === 0
        ? h`<div class="empty">
            <h2>LLM-Phantom</h2>
            <p>Qwen3.5-397B-A17B on AMD Ryzen AI Max+ 395</p>
            <p style=${{ marginTop: '4px', fontSize: '12px', opacity: 0.7 }}>HIP + io_uring + LFU Expert Cache</p>
          </div>`
        : messages.map((m, i) => h`<${Message} key=${i} ...${m} />`)}
    </div>
    <div class="input-area">
      <form class="input-form" onSubmit=${(e) => { e.preventDefault(); send(); }}>
        <textarea ref=${taRef} value=${input} onInput=${onInput} onKeyDown=${onKey}
          placeholder="Send a message..." rows="1" />
        <button type="submit" disabled=${chat.isPending || !input.trim()}>
          ${chat.isPending ? '...' : 'Send'}
        </button>
      </form>
    </div>`;
}

createRoot(document.getElementById('root')).render(
  h`<${QueryClientProvider} client=${qc}><${App} /><//>`
);
</script>
</body>
</html>
